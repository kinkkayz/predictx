# Deploy at https://render.com — Blueprint with persistent Postgres
databases:
  - name: predictx-db
    plan: free
    databaseName: predictx
    user: predictx

services:
  - type: web
    name: predictx
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: BASE_URL
        value: https://fabapa.com
      - key: DATABASE_URL
        fromDatabase:
          name: predictx-db
          property: connectionString
      # Optional: ADMIN_EMAIL=your@email.com
