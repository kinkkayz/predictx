# Deploy at https://render.com — connect this repo and Render reads this file.
services:
  - type: web
    name: predictx
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: BASE_URL
        value: https://predictx-dwu1.onrender.com
      # Set in Render dashboard (do not commit secrets):
      # SECRET_KEY, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
